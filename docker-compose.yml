services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=quiztopia-v2
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password

  cache:
    image: redis:8.6.3
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
